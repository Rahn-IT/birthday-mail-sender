{% extends 'layout.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
{% if has_error and error_message %}
<p class="muted">{{ error_message }}</p>
{% endif %}
<form method="post" action="{{ form_action }}" class="plan-form">
    <p>
        <label for="first_name">First Name</label><br />
        <input id="first_name" name="first_name" type="text" value="{{ form.first_name }}" required />
    </p>
    <p>
        <label for="last_name">Last Name</label><br />
        <input id="last_name" name="last_name" type="text" value="{{ form.last_name }}" required />
    </p>
    <p>
        <label for="greeting">Greeting</label><br />
        <input id="greeting" name="greeting" type="text" value="{{ form.greeting }}" required />
    </p>
    <p>
        <label for="email">Email</label><br />
        <input id="email" name="email" type="email" value="{{ form.email }}" required />
    </p>
    <p>
        <label for="birthday">Birthday</label><br />
        <input id="birthday" name="birthday" type="date" value="{{ form.birthday }}" required />
    </p>
    <div class="toolbar">
        <input class="btn btn-primary" type="submit" value="{{ submit_label }}" />
        <a class="btn" href="{{ cancel_href }}">Cancel</a>
    </div>
</form>
{% endblock %}
